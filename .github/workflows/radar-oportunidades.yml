name: Radar de Oportunidades ARCA

on:
  schedule:
    # Roda de hora em hora. GitHub usa horário UTC.
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: radar-oportunidades-arca
  cancel-in-progress: false

jobs:
  radar:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar radar
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python radar_oportunidades.py

      - name: Salvar artifact
        uses: actions/upload-artifact@v4
        with:
          name: radar-oportunidades-arca
          path: relatorios/

      - name: Commitar histórico do radar
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git pull --rebase origin main || true
          git add relatorios/ carteira.json
          git diff --staged --quiet && echo "Sem mudanças para commitar" || git commit -m "Atualiza histórico do radar"
          git push || echo "Push falhou, mas o radar já executou"
